name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs: pushing to a PR cancels the previous run for that PR (same group name).
# Pushes to main are never cancelled because the SHA makes each group name unique.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
          - python: "3.12"
          - python: "3.13"
          # TODO: Add "3.14" once dbt-core 1.12 stable is released.
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Install
        run: pip install .

      - name: Verify pal adapter is registered
        run: dbt --version | grep -q -- "- pal:"

  integration-test:
    # Run on push to main, and on pull requests whose head branch lives in this repository.
    # Fork PRs are excluded: GitHub does not pass secrets to them, so the job would only fail at authentication.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    needs: lint-and-install
    runs-on: ubuntu-latest
    # Job-specific datasets so that matrix jobs (and concurrent workflow runs) never share tables
    env:
      SRC_DATASET: src_${{ github.run_id }}_${{ strategy.job-index }}
      DEST_DATASET: dest_${{ github.run_id }}_${{ strategy.job-index }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            dbt-core: "1.11.3"
            dbt-bigquery: "1.11.0"
          - python: "3.12"
            dbt-core: "1.11.3"
            dbt-bigquery: "1.11.0"
          - python: "3.13"
            dbt-core: "1.11.3"
            dbt-bigquery: "1.11.0"
          # Python 3.14 is tested only against dbt 1.12: dbt-core 1.11 does not run on Python 3.14
          - python: "3.11"
            dbt-core: "1.12.0b3"
            dbt-bigquery: "1.12.0b1"
          - python: "3.12"
            dbt-core: "1.12.0b3"
            dbt-bigquery: "1.12.0b1"
          - python: "3.13"
            dbt-core: "1.12.0b3"
            dbt-bigquery: "1.12.0b1"
          - python: "3.14"
            dbt-core: "1.12.0b3"
            dbt-bigquery: "1.12.0b1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install "dbt-core==${{ matrix.dbt-core }}" "dbt-bigquery==${{ matrix.dbt-bigquery }}"
          pip install .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify BigQuery access
        run: bq ls

      # --force tolerates a dataset left behind by a failed cleanup when the job is re-run
      - name: Create datasets
        run: |
          bq mk --force --location=asia-northeast1 -d ${{ vars.GOOGLE_CLOUD_PROJECT }}:$SRC_DATASET
          bq mk --force --location=asia-northeast1 -d ${{ vars.GOOGLE_CLOUD_PROJECT }}:$DEST_DATASET

      - name: Load test data into BigQuery
        run: bq load --source_format=CSV --autodetect --replace ${{ vars.GOOGLE_CLOUD_PROJECT }}:$SRC_DATASET.test_table tests/integration/data/test_table.csv

      # `dbt-core@1.11.3` calls `deepcopy()` with a probability of 1/5001
      # https://github.com/dbt-labs/dbt-core/blob/v1.11.3/core/dbt/parser/models.py#L273
      # Below is the test code that reproduces this situation
      # It tests that `deepcopy()` is called as expected, and that `dbt run` does not fail even when `deepcopy()` is invoked.
      - name: Run dbt (with deepcopy forced via parser sampling)
        run: |
          python -c "
          from unittest.mock import patch
          from copy import deepcopy
          from dbt.cli.main import dbtRunner
          with patch('dbt.parser.models.random.randint', return_value=5000), \
               patch('dbt.parser.models.deepcopy', wraps=deepcopy) as mock_deepcopy:
              result = dbtRunner().invoke(['run', '--project-dir', 'tests/integration', '--profiles-dir', 'tests/integration'])
              if not result.success:
                  raise SystemExit(1)
              assert mock_deepcopy.called, \
                  'deepcopy was not triggered - 5000 may no longer be the correct value. Check dbt.parser.models.'
          "

      - name: Run dbt
        run: dbt run --project-dir tests/integration --profiles-dir tests/integration

      - name: Verify SQL view model output
        run: |
          bq query --use_legacy_sql=false --format=csv "SELECT * FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.sql_model_view\` ORDER BY id" | diff - tests/integration/expected/sql_model_view.csv
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT table_type FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.INFORMATION_SCHEMA.TABLES\` WHERE table_name = 'sql_model_view'" | tail -1)" = "VIEW"

      - name: Verify SQL table model output
        run: |
          bq query --use_legacy_sql=false --format=csv "SELECT * FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.sql_model_table\` ORDER BY id" | diff - tests/integration/expected/sql_model_table.csv
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT table_type FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.INFORMATION_SCHEMA.TABLES\` WHERE table_name = 'sql_model_table'" | tail -1)" = "BASE TABLE"

      - name: Verify Python model output
        run: bq query --use_legacy_sql=false --format=csv "SELECT * FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.python_model\` ORDER BY id" | diff - tests/integration/expected/python_model.csv

      - name: Verify Python model with import output
        run: bq query --use_legacy_sql=false --format=csv "SELECT * FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.python_model_with_import\` ORDER BY id" | diff - tests/integration/expected/python_model_with_import.csv

      - name: Verify Python model with function-body import output
        run: bq query --use_legacy_sql=false --format=csv "SELECT * FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.python_model_function_import\` ORDER BY id" | diff - tests/integration/expected/python_model_function_import.csv

      - name: Verify empty DataFrame model output
        run: |
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT column_name FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.INFORMATION_SCHEMA.COLUMNS\` WHERE table_name = 'python_model_empty_df'" | tail -1)" = "_dummy"
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT COUNT(*) FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.python_model_empty_df\`" | tail -1)" = "0"

      - name: Verify zero rows model output
        run: |
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT column_name FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.INFORMATION_SCHEMA.COLUMNS\` WHERE table_name = 'python_model_zero_rows'" | tail -1)" = "col"
          test "$(bq query --use_legacy_sql=false --format=csv "SELECT COUNT(*) FROM \`${{ vars.GOOGLE_CLOUD_PROJECT }}.$DEST_DATASET.python_model_zero_rows\`" | tail -1)" = "0"

      - name: Cleanup
        if: always()
        run: |
          bq rm -r -f -d ${{ vars.GOOGLE_CLOUD_PROJECT }}:$SRC_DATASET
          bq rm -r -f -d ${{ vars.GOOGLE_CLOUD_PROJECT }}:$DEST_DATASET

  check:
    if: always()
    needs: [lint-and-install, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          test "${{ needs.lint-and-install.result }}" = "success"
          # Same condition as the integration-test job itself: require its success whenever it should have run
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            test "${{ needs.integration-test.result }}" = "success"
          fi
